<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVCraft Pro - Assistant Carrière Intelligent</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Fix Bug #1: PDF Export (Adding html2pdf.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --ink: #0f0f0f; --cream: #faf8f3; --gold: #c8972a; --gold-lt: #f0d98a; --teal: #1a6b6b;
            --teal-lt: #d4eeee; --muted: #6b6860; --border: #e2ded6; --card: #ffffff; --danger: #c0392b;
            --success: #1a8a5a; --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.07);
        }
        [data-theme="dark"] {
            --ink: #e8e8f0; --cream: #13131f; --gold: #f0d98a; --gold-lt: #3d3520; --teal: #2dd4bf;
            --teal-lt: #1a2a2a; --muted: #9ca3af; --border: #2d2d44; --card: #1e1e35;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; transition: background .3s, color .3s; }
        header { background: #0f0f0f; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #fff; letter-spacing: -.5px; cursor: pointer; }
        .logo span { color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .theme-toggle { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 4px; border-radius: 6px; transition: .2s; }
        .progress-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; }
        .step-tab { display: flex; align-items: center; gap: 8px; padding: 14px 20px; cursor: pointer; border-bottom: 3px solid transparent; color: var(--muted); font-size: .85rem; font-weight: 500; }
        .step-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
        .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: .72rem; display: flex; align-items: center; justify-content: center; }
        .step-tab.active .step-num { background: var(--teal); color: #fff; }
        main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
        .tpl-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer; transition: .2s; position: relative; }
        .tpl-card.selected { border-color: var(--teal); }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 22px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: .2s; text-decoration: none; }
        .btn-primary { background: var(--teal); color: #fff; }
        .btn-secondary { background: var(--card); color: var(--ink); border: 1px solid var(--border); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        input, textarea, select { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); color: var(--ink); }
        .nav-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 12px 2rem; display: flex; justify-content: space-between; align-items: center; }
        #gen-overlay { display: none; position: fixed; inset: 0; background: rgba(15,15,15,0.8); z-index: 200; justify-content: center; align-items: center; color: #fff; }
        .score-gauge { width: 120px; height: 120px; position: relative; display: inline-block; }
        .score-gauge svg { transform: rotate(-90deg); }
        .score-gauge .value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; }
        .toast { position: fixed; top: 80px; right: 1.5rem; background: #333; color: #fff; padding: 12px 20px; border-radius: 8px; z-index: 300; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="showDashboard()">CVCraft <span>Pro</span></div>
        <div class="header-right">
            <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <nav id="step-tabs" class="progress-bar" style="display:none">
        <div class="step-tab" id="tab-1" onclick="goStep(1)"><div class="step-num">1</div> Modèle</div>
        <div class="step-tab" id="tab-2" onclick="goStep(2)"><div class="step-num">2</div> Contenu</div>
        <div class="step-tab" id="tab-3" onclick="goStep(3)"><div class="step-num">3</div> Poste</div>
        <div class="step-tab" id="tab-4" onclick="goStep(4)"><div class="step-num">4</div> Export</div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div class="dashboard-hero" style="text-align:center; padding:3rem; background:var(--teal-lt); border-radius:12px; margin-bottom:2rem">
                <h1>CV Craft Pro</h1>
                <p>Assistant Intelligent pour vos candidatures</p><br>
                <button class="btn btn-primary" onclick="startNewCV()">✨ Créer un nouveau CV</button>
            </div>
            <div id="cv-list" class="grid-3"></div>
        </div>

        <div id="view-step1" class="view">
            <h2>Choisissez votre modèle</h2><br>
            <div class="grid-3">
                <div class="tpl-card selected" data-tpl="classic" onclick="selectTpl(this)">Classique Doré</div>
                <div class="tpl-card" data-tpl="modern" onclick="selectTpl(this)">Moderne Bleu</div>
                <div class="tpl-card" data-tpl="executive" onclick="selectTpl(this)">Executive Sombre</div>
            </div>
        </div>

        <div id="view-step2" class="view">
            <h2>Votre contenu</h2><br>
            <div class="card">
                <div class="form-row">
                    <div class="form-group"><label>Prénom</label><input type="text" id="q-prenom" oninput="autoSave()"></div>
                    <div class="form-group"><label>Nom</label><input type="text" id="q-nom" oninput="autoSave()"></div>
                </div>
                <div class="form-group"><label>Titre</label><input type="text" id="q-titre" oninput="autoSave()"></div>
                <div class="form-row">
                    <div class="form-group"><label>Email</label><input type="email" id="q-email" oninput="autoSave()"></div>
                    <div class="form-group"><label>Tél</label><input type="tel" id="q-tel" oninput="autoSave()"></div>
                </div>
                <h3>Expériences</h3>
                <div id="exp-list"></div>
                <button class="btn btn-secondary btn-sm" onclick="addExp()">+ Expérience</button>
            </div>
        </div>

        <div id="view-step3" class="view">
            <h2>Poste ciblé</h2><br>
            <div class="card">
                <div class="form-group"><label>Intitulé du poste</label><input type="text" id="job-title"></div>
                <div class="form-group"><label>Description de l'offre</label><textarea id="job-desc"></textarea></div>
            </div>
        </div>

        <div id="view-step4" class="view">
            <h2>Génération & Export</h2><br>
            <button class="btn btn-primary" style="width:100%" onclick="generateCV()">✨ Générer le CV</button>
            <div id="result-area" style="margin-top:2rem; display:none">
                <div class="score-gauge">
                    <svg width="120" height="120"><circle cx="60" cy="60" r="52" fill="none" stroke="#eee" stroke-width="8"/><circle id="ats-arc" cx="60" cy="60" r="52" fill="none" stroke="var(--teal)" stroke-width="8" stroke-dasharray="0 327"/></svg>
                    <div class="value"><span id="ats-value">0</span>%</div>
                </div>
                <div id="cv-preview" style="margin-top:2rem; padding:1rem; background:#fff; border:1px solid #ccc; min-height:400px"></div>
                <div class="btn-group" style="margin-top:2rem">
                    <button class="btn btn-primary" onclick="exportPDF()">📄 Télécharger PDF</button>
                    <button class="btn btn-secondary" onclick="saveCV()">💾 Sauvegarder</button>
                </div>
            </div>
        </div>
    </main>

    <footer id="nav-footer" class="nav-footer" style="display:none">
        <button id="btn-prev" class="btn btn-secondary" onclick="prevStep()">← Précédent</button>
        <span id="step-label">Étape 1 / 4</span>
        <button id="btn-next" class="btn btn-primary" onclick="nextStep()">Suivant →</button>
    </footer>

    <div id="gen-overlay">Génération en cours...</div>
    <div id="toast-container"></div>

    <script>
        let state = { currentStep: 0, template: 'classic', cvs: [] };

        // Fix Bug #4: Dark Mode Icon
        function toggleTheme() {
            const d = document.documentElement;
            const isDark = d.getAttribute('data-theme') === 'dark';
            d.setAttribute('data-theme', isDark ? '' : 'dark');
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('cvcraft_theme', isDark ? '' : 'dark');
        }

        // Initialize theme
        if(localStorage.getItem('cvcraft_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-btn').textContent = '☀️';
        }

        function showDashboard() {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-dashboard').classList.add('active');
            document.getElementById('step-tabs').style.display = 'none';
            document.getElementById('nav-footer').style.display = 'none';
            state.currentStep = 0;
            renderCVList();
        }

        function startNewCV() {
            document.getElementById('step-tabs').style.display = 'flex';
            document.getElementById('nav-footer').style.display = 'flex';
            goStep(1);
        }

        // Fix Bug #3: Step Jump logic
        function goStep(n) {
            state.currentStep = n;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.step-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-step' + n).classList.add('active');
            document.getElementById('tab-' + n).classList.add('active');
            document.getElementById('step-label').textContent = 'Étape ' + n + ' / 4';
            document.getElementById('btn-prev').disabled = n === 1;
            document.getElementById('btn-next').textContent = n === 4 ? 'Dashboard' : 'Suivant →';
        }

        function nextStep() {
            if(state.currentStep === 4) showDashboard();
            else goStep(state.currentStep + 1);
        }

        function prevStep() {
            if(state.currentStep === 1) showDashboard();
            else goStep(state.currentStep - 1);
        }

        function selectTpl(card) {
            document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            state.template = card.dataset.tpl;
        }

        function addExp() {
            const div = document.createElement('div');
            div.className = 'exp-item card';
            div.style.marginBottom = '10px';
            div.innerHTML = `
                <input type="text" placeholder="Poste" class="e-title" style="margin-bottom:5px">
                <textarea placeholder="Missions" class="e-missions"></textarea>
            `;
            document.getElementById('exp-list').appendChild(div);
        }

        async function generateCV() {
            document.getElementById('gen-overlay').style.display = 'flex';
            const data = collectData();
            setTimeout(() => {
                const html = buildHTML(data);
                document.getElementById('cv-preview').innerHTML = html;
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('gen-overlay').style.display = 'none';
                
                // Fix Bug #2: Stable ATS Score
                const score = calculateATS(data);
                document.getElementById('ats-value').textContent = score;
                document.getElementById('ats-arc').setAttribute('stroke-dasharray', (score/100 * 327) + ' 327');
                toast("✅ CV Généré");
            }, 1000);
        }

        function buildHTML(d) {
            const color = d.template === 'modern' ? '#3b6bdb' : '#c8972a';
            // Fix Bug #6: Newline literals
            const formatText = t => t.replace(/\n/g, '<br>');
            return `
                <div style="font-family:sans-serif; padding:20px; color:#333">
                    <h1 style="color:${color}">${d.prenom} ${d.nom}</h1>
                    <div style="font-weight:bold">${d.titre}</div>
                    <div style="font-size:12px; margin-bottom:20px">${d.email} | ${d.tel}</div>
                    <h3 style="border-bottom:1px solid ${color}">EXPÉRIENCES</h3>
                    ${d.exp.map(e => `<div style="margin-bottom:10px"><b>${e.title}</b><br>${formatText(e.missions)}</div>`).join('')}
                </div>
            `;
        }

        function collectData() {
            const exp = Array.from(document.querySelectorAll('.exp-item')).map(e => ({
                title: e.querySelector('.e-title').value,
                missions: e.querySelector('.e-missions').value
            }));
            return {
                prenom: document.getElementById('q-prenom').value,
                nom: document.getElementById('q-nom').value,
                titre: document.getElementById('q-titre').value,
                email: document.getElementById('q-email').value,
                tel: document.getElementById('q-tel').value,
                template: state.template,
                exp: exp,
                jobTitle: document.getElementById('job-title').value
            };
        }

        function calculateATS(d) {
            let s = 10;
            if(d.prenom && d.nom) s += 20;
            if(d.email && d.tel) s += 20;
            if(d.jobTitle && d.titre.toLowerCase().includes(d.jobTitle.toLowerCase())) s += 30;
            if(d.exp.length > 0) s += 20;
            return s;
        }

        // Fix Bug #1: PDF Export using html2pdf
        function exportPDF() {
            const element = document.getElementById('cv-preview');
            html2pdf().from(element).set({
                margin: 10,
                filename: (document.getElementById('q-nom').value || 'CV') + '.pdf',
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        function saveCV() {
            const cvs = JSON.parse(localStorage.getItem('cvcraft_cvs') || '[]');
            const name = document.getElementById('q-prenom').value + " " + document.getElementById('q-nom').value;
            cvs.push({ name: name.trim() || 'Sans nom', template: state.template, date: Date.now() });
            localStorage.setItem('cvcraft_cvs', JSON.stringify(cvs));
            toast("💾 Sauvegardé");
        }

        function renderCVList() {
            const cvs = JSON.parse(localStorage.getItem('cvcraft_cvs') || '[]');
            document.getElementById('cv-list').innerHTML = cvs.map(c => `
                <div class="card">
                    <h4>${c.name}</h4>
                    <p style="font-size:12px">${c.template} · ${new Date(c.date).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        // Fix Bug #8: Auto-save
        function autoSave() {
            localStorage.setItem('cvcraft_draft', JSON.stringify(collectData()));
        }

        function toast(m) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        renderCVList();
    </script>
</body>
</html>
